href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjYFDE4ekE0ua7b1RjbpAENLB63UzhEvOR5ctrf0LRypl7a4d5uITYrErz8Im2ZoVFwusC_VFIQSi3fcWe1BgrOvqsJKDHJR5pGaw6gtRBRtVrxA19tqU0757HYvFF6tGQv3pS97FqIQJCHP1AQTgpFf6y8061Lr1lVIrEty6DH2awKEQA4WEyBirjXNbWH/s512/Untitled_design__2_-removebg-preview.png">

<!-- iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MAREVI">

<link rel="apple-touch-icon"
href="/marevi-store/icon-512.png">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

iframe{
width:100%;
height:100%;
border:none;
}

#installBtn{
position:fixed;
left:15px;
bottom:15px;
background:#000;
color:white;
padding:12px 18px;
border-radius:40px;
cursor:pointer;
font-size:14px;
font-weight:600;
box-shadow:0 4px 15px rgba(0,0,0,.35);
z-index:9999;
display:none;
transition:.3s;
}

#installBtn:hover{
background:#222;
}

</style>
</head>
<body>

<iframe
src="https://www.appsheet.com/start/9f26de9e-d00d-416f-84c2-54365e5917ae?refresh=1"
allowfullscreen
allow="geolocation">
</iframe>

<div id="installBtn">
📲 Install App
</div>

<script>

const installBtn=document.getElementById("installBtn");
let deferredPrompt;

// Android
window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt=e;

installBtn.style.display="block";

});

// Klik tombol
installBtn.addEventListener("click",async()=>{

// iPhone Safari
if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){

alert(
"Untuk iPhone:\n\nTekan Share → Add to Home Screen"
);

return;

}

// Android
if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt=null;

installBtn.style.display="none";

}else{

alert("Gunakan menu browser → Install App");

}

});

// Sudah terinstall
window.addEventListener("appinstalled",()=>{

installBtn.style.display="none";

});

// iPhone belum terinstall
if(
/iPhone|iPad|iPod/i.test(navigator.userAgent)
&& !window.navigator.standalone
){

installBtn.style.display="block";

}

// Register Service Worker
if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("/marevi-store/sw.js")
.then(()=>console.log("SW registered"))
.catch(err=>console.log(err));

});

}

</script>

</body>
</html>

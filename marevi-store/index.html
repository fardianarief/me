<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#000;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* Tombol install */

#installBtn{
position:fixed;
left:15px;
bottom:15px;
padding:12px 16px;
background:#000;
color:white;
border-radius:40px;
font-size:14px;
font-weight:600;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.4);
z-index:9999;
display:none;
}

#installBtn:hover{
background:#222;
}

</style>

</head>
<body>

<iframe
src="https://www.appsheet.com/start/9f26de9e-d00d-416f-84c2-54365e5917ae?refresh=1"
allowfullscreen
allow="geolocation">
</iframe>

<div id="installBtn">
📲 Install App
</div>

<script>

let deferredPrompt;
const installBtn = document.getElementById("installBtn");

// Android Chrome
window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault();

deferredPrompt = e;

installBtn.style.display = "block";

});

// Tombol diklik
installBtn.addEventListener("click",async()=>{

// iPhone Safari
if (/iphone|ipad|ipod/i.test(navigator.userAgent)){

alert(
"Untuk iPhone:\n\nTekan tombol Share Safari lalu pilih 'Add to Home Screen'."
);

return;
}

// Android
if(deferredPrompt){

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

deferredPrompt = null;

installBtn.style.display = "none";

}

});

// App sudah terpasang
window.addEventListener("appinstalled",()=>{

installBtn.style.display = "none";

});

// Register Service Worker
if ("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("./sw.js");

});

}

// Jika iPhone Safari dan belum terinstall
if (
/iphone|ipad|ipod/i.test(navigator.userAgent) &&
!window.navigator.standalone
){
installBtn.style.display = "block";
}

</script>

</body>
